name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate Python source
        run: |
          python -m py_compile src/data_loader.py src/model.py src/train.py src/evaluate.py deployment/app.py deployment/utils.py deployment/predict.py training/train_v1.py training/train_v2.py mlflow_tracking.py
      - name: Build Docker image
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t plant-disease-app .
